<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>What should I read next?</title>
    <link rel="shortcut icon" href="src/img/icon.png" type="image/png">

    <link rel="stylesheet" href="src/style/Quiz_style.css">
    <link rel="script" href="src/style/Quiz_script.js">
    
</head>
<body>
    <form action="Result.html" method="get"> 

        
        <label for="genre">Choose a genre:</label>          
        <select id="genre" name="genre" class="genre">                   
            <option value="---">---</option>                
            <option value="romance">Romance</option>        
            <option value="Horror">Horror</option>          
            <option value="mystery">Mystery</option>        // Need to create a display for the results page that will show the user the book recommendation based on their answers to the quiz.
            <option value="fantasy">Fantasy</option>
            <option value="science-fiction">Science Fiction</option>
        </select>
        <br><br>

        <label for="length">Choose a book length:</label>        
        <select id="length" name="length" class="length">                  
            <option value="---">---</option>                
            <option value="short">Short</option>
            <option value="medium">Medium</option>          
            <option value="long">Long</option>
        </select>
        <br><br>

        <label for="mood">Choose a mood:</label>            
        <select id="mood" name="mood" class="mood">                      
            <option value="---">---</option>                
            <option value="happy">Happy</option>
            <option value="sad">Sad</option>               
            <option value="adventurous">Adventurous</option>
            <option value="romantic">Romantic</option>
            <option value="thought-provoking">Thought-Provoking</option>
        </select>
        <br><br>

        <label for="author">Choose a gender for the author:</label> //This section doesn't sound like such a great question, maybe way too broad and not really relevant to the user's preferences. I might need to rethink this question or maybe just remove it altogether.
        <select id="author" name="author">                          //This is just wrong for the name of the dropdown menu, I need to change it to something like "author-gender" or something like that.
            <option value="---">---</option>
            <option value="man">Man</option>
            <option value="woman">Woman</option>
        </select>
        <br><br>

        <input type="submit" value="Submit">
    </form>
</body>
</html>
