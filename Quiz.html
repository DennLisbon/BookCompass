<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>What should I read next?</title>
    <link rel="shortcut icon" href="src/img/favicon.webp" type="image/webp">

    <link rel="stylesheet" href="src/style/Quiz_style.css">
    <script src="src/JS/Quiz_script.js" defer></script>
    
</head>
<body>
    <form action="Result.html" method="get"> 

        
        <fieldset>
            <legend>Book Recommendations Quiz</legend><br>
            
            <div class="question">
            <label for="genre">What genre interests you?</label>   
            <select id="genre" name="genre" class="genre" required>                   
                <option value="">Select an option</option>                
                <option value="romance">Romance</option>        
                <option value="horror">Horror</option>          
                <option value="mystery">Mystery</option>
                <option value="fantasy">Fantasy</option>
                <option value="science-fiction">Science Fiction</option>
            </select>
            </div><br>

            <div class="question">
            <label for="length">Preferred book length?</label>        
            <select id="length" name="length" class="length" required>                  
                <option value="">Select an option</option>                
                <option value="short">Short (<= 200 pages)</option>
                <option value="medium">Medium (200-400 pages)</option>          
                <option value="long">Long (>= 400 pages)</option>
            </select>
            </div><br>

            
        <div class="question">
        <label for="pace">How fast-paced do you prefer your stories?</label>
        <select id="pace" name="pace" class="pace" required>
            <option value="">Select an option</option>
            <option value="slow">Slow and contemplative</option>
            <option value="moderate">Moderate pace</option>
            <option value="fast">Fast and thrilling</option>
        </select>
        </div><br>
        </fieldset>

        <input id="Potton" type="submit" value="Submit"><br>
        <button onclick="">
          click here to see your results
        </button>
            <!--eu tenho que decidir qual dos dois modos é mais eficiente-->
            <!--eu aprendi por button, mas esse input parece interessante-->
    </form>
</body>
</html>
